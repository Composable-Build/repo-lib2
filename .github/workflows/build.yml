name: build
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build
      - name: Package
        run: |
          mkdir -p dist
          cp build/libplugin_two.so dist/
          tar -czf dist/plugin_two.tar.gz -C dist libplugin_two.so
      - uses: actions/upload-artifact@v4
        with:
          name: plugin_two
          path: dist/plugin_two.tar.gz
